services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gas_incident_platform
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongopass}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_ROOT_USER:-mongoadmin}", "--password", "${MONGO_ROOT_PASSWORD:-mongopass}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-mongoadmin}:${MONGO_ROOT_PASSWORD:-mongopass}@mongo:27017/?authSource=admin
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4445:5020"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    ports:
      - "149.102.158.71:8070:80"    # HTTP (proxied by FIKA nginx for cadent.nxzen.com)
      - "4444:80"                    # Legacy port (kept for backward compatibility)
    depends_on:
      - backend

  slack_bot:
    build:
      context: ./slack_bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      BACKEND_BASE_URL: http://backend:5020
    ports:
      - "8090:8090"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
