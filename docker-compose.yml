services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gas_incident_platform
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: M0ng0Cadent2025Secure
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "mongoadmin", "--password", "M0ng0Cadent2025Secure", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MONGODB_URI: mongodb://mongoadmin:M0ng0Cadent2025Secure@mongo:27017/?authSource=admin
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4445:5020"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    ports:
      - "4444:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
